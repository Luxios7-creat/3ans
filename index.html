<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suivi du temps</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <h1>Suivi du temps</h1>

    <form id="time-form">
      <label for="date">Date :</label>
      <input type="date" id="date" required />

      <label for="category">Domaine :</label>
      <select id="category" required>
        <option value="travail">Travail</option>
        <option value="loisir">Loisir</option>
        <option value="sport">Sport</option>
        <option value="projet perso">Projet perso</option>
        <option value="autre">Autre</option>
      </select>

      <label for="hours">Heures :</label>
      <input type="number" id="hours" step="0.1" required />

      <button type="submit">Ajouter</button>
    </form>

    <section id="filter">
      <h2>Filtrer les données</h2>
      <label for="period">Période :</label>
      <select id="period">
        <option value="all">Tout</option>
        <option value="week">Cette semaine</option>
        <option value="month">Ce mois</option>
      </select>
    </section>

    <ul id="entries-list"></ul>

    <canvas id="timeChart"></canvas>

    <button id="exportBtn">💾 Exporter les données</button>

    <script src="script.js"></script>
  </body>
</html>
